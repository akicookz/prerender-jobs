steps:
  # Build image tagged with latest
  - name: gcr.io/cloud-builders/docker
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/prerender-jobs:latest"
      - "."

  # Push latest
  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/prerender-jobs:latest"]

  # Update Cloud Run Job to use latest tag
  - name: gcr.io/cloud-builders/gcloud
    args:
      [
        "run",
        "jobs",
        "update",
        "${_JOB_NAME}",
        "--image=gcr.io/$PROJECT_ID/prerender-jobs:latest",
        "--region=${_REGION}",
        "--project=$PROJECT_ID",
      ]

substitutions:
  _REGION: us-east1
  _JOB_NAME: prerender-jobs
